name: Build Android APK & AAB

# Builds the Android app on a cloud Linux runner and produces BOTH outputs:
#   - app-release.apk  (installable directly on a device / sideload)
#   - app-release.aab  (Android App Bundle for Google Play upload)
# Both files are collected into a single folder named `apk/` and uploaded as a
# build artifact. The release build is debug-signed (see android/app/build.gradle:
# signingConfig = signingConfigs.getByName("debug")), so NO keystore secrets are
# required — the APK installs as-is. For a Play-Store upload you'd re-sign the AAB
# with an upload key.

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # JDK 17 — required by the Android Gradle Plugin used by this project.
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # Pin to the project's Flutter version. Newer stables (3.44+) break this
      # codebase (IconData became a final class -> breaks phosphor_flutter 2.1.0,
      # and CupertinoPageTransitionsBuilder was removed). 3.41.6 builds the app.
      - name: Set up Flutter 3.41.6
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.41.6
          channel: stable
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      # ---- Build both artifacts (release) ----
      - name: Build APK (release)
        run: flutter build apk --release

      - name: Build AAB (release)
        run: flutter build appbundle --release

      # ---- Collect both into a single `apk/` folder ----
      - name: Collect outputs into apk/
        run: |
          set -euo pipefail
          mkdir -p apk
          cp build/app/outputs/flutter-apk/app-release.apk apk/
          cp build/app/outputs/bundle/release/app-release.aab apk/
          echo "Contents of apk/:"
          ls -lh apk/

      - name: Upload apk/ folder (APK + AAB)
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-aab
          path: apk/
          if-no-files-found: error
