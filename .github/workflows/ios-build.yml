name: Build iOS IPA

# Builds the iOS app on a cloud macOS runner (the only place an .ipa can be produced).
# Default run is UNSIGNED so it works with zero Apple credentials — it still emits a
# real .ipa artifact you can download and re-sign (AltStore / Sideloadly / a signing
# service / `codesign`). For a store/TestFlight-ready SIGNED build, add the signing
# secrets documented below and set the `signed` input to true.

on:
  workflow_dispatch:
    inputs:
      signed:
        description: "Produce a SIGNED build (requires Apple signing secrets)"
        type: boolean
        default: false
  push:
    tags:
      - "v*"

jobs:
  build-ios:
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Pin to the project's Flutter version. Newer stables (3.44+) break this
      # codebase: IconData became a final class (breaks phosphor_flutter 2.1.0) and
      # CupertinoPageTransitionsBuilder was removed (breaks app_theme.dart). 3.41.6
      # is the version that builds the app locally.
      - name: Set up Flutter 3.41.6
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.41.6
          channel: stable
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      # ---------------------------------------------------------------------
      # SIGNED PATH — runs only when input `signed` is true.
      # Requires these repo secrets:
      #   IOS_CERTIFICATE_P12_BASE64   base64 of your Apple distribution cert (.p12)
      #   IOS_CERTIFICATE_PASSWORD     the .p12 export password
      #   IOS_PROVISIONING_PROFILE_BASE64  base64 of the .mobileprovision
      #   IOS_EXPORT_OPTIONS_PLIST_BASE64  base64 of an ExportOptions.plist (teamID, method, etc.)
      #   KEYCHAIN_PASSWORD            any throwaway password for the temp keychain
      # ---------------------------------------------------------------------
      - name: Import signing assets (signed only)
        if: ${{ inputs.signed == true }}
        env:
          P12_BASE64: ${{ secrets.IOS_CERTIFICATE_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          EXPORT_PLIST_BASE64: ${{ secrets.IOS_EXPORT_OPTIONS_PLIST_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          CERT_PATH="$RUNNER_TEMP/cert.p12"
          PROFILE_PATH="$RUNNER_TEMP/profile.mobileprovision"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          echo "$P12_BASE64" | base64 --decode > "$CERT_PATH"
          echo "$PROFILE_BASE64" | base64 --decode > "$PROFILE_PATH"
          echo "$EXPORT_PLIST_BASE64" | base64 --decode > "$RUNNER_TEMP/ExportOptions.plist"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/"

      - name: Build SIGNED IPA
        if: ${{ inputs.signed == true }}
        run: |
          set -euo pipefail
          flutter build ipa --release \
            --export-options-plist "$RUNNER_TEMP/ExportOptions.plist"
          ls -lh build/ios/ipa/*.ipa

      # ---------------------------------------------------------------------
      # UNSIGNED PATH — default. Always produces a real .ipa file.
      # ---------------------------------------------------------------------
      # Flutter's own `build ios --no-codesign` compiles fine but its post-build
      # wrapper still hard-errors on a missing Development Team. So we bypass it:
      # generate the Xcode config + pods, then archive directly with xcodebuild and
      # signing fully disabled, and wrap the resulting .app into a real .ipa.
      - name: Generate iOS build config (no codesign)
        if: ${{ inputs.signed != true }}
        run: flutter build ios --release --no-codesign --config-only

      - name: CocoaPods install
        if: ${{ inputs.signed != true }}
        run: cd ios && pod install

      - name: Archive UNSIGNED (xcodebuild)
        if: ${{ inputs.signed != true }}
        run: |
          set -euo pipefail
          xcodebuild \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -archivePath "$RUNNER_TEMP/Runner.xcarchive" \
            archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_ENTITLEMENTS="" \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE_SPECIFIER="" \
            DEVELOPMENT_TEAM=""

      - name: Package UNSIGNED .ipa
        if: ${{ inputs.signed != true }}
        run: |
          set -euo pipefail
          APP_PATH=$(find "$RUNNER_TEMP/Runner.xcarchive/Products/Applications" -maxdepth 1 -name "*.app" | head -1)
          test -n "$APP_PATH" || { echo "No .app in archive"; exit 1; }
          echo "App: $APP_PATH"
          mkdir -p build/ios/ipa/Payload
          cp -R "$APP_PATH" build/ios/ipa/Payload/
          (cd build/ios/ipa && zip -qr Runner-unsigned.ipa Payload && rm -rf Payload)
          ls -lh build/ios/ipa/*.ipa

      - name: Show IPA path
        run: |
          echo "IPA(s) produced:"
          find build/ios/ipa -name "*.ipa" -exec ls -lh {} \;

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: build/ios/ipa/*.ipa
          if-no-files-found: error
