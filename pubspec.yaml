name: speech_translator_app
description: Real-time multilingual speech translator for holy shrine visitors
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management & Routing
  get: ^4.6.6

  # UI & Design
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  flutter_animate: ^4.5.2
  animations: ^2.0.11
  shimmer: ^3.0.0
  flutter_staggered_animations: ^1.1.1
  phosphor_flutter: ^2.1.0
  lottie: ^3.3.1
  flutter_slidable: ^3.1.1
  badges: ^3.1.2
  gap: ^3.0.1
  loading_animation_widget: ^1.3.0
  cached_network_image: ^3.4.1
  smooth_page_indicator: ^1.2.0+3
  scrollable_positioned_list: ^0.3.8

  # Audio
  record: ^6.0.0
  flutter_tts: ^4.0.2
  permission_handler: ^11.0.1

  # Media & Location
  image_picker: ^1.0.0
  geolocator: ^10.1.0
  url_launcher: ^6.2.0
  flutter_map: ^7.0.0
  latlong2: ^0.9.0

  # OCR & Text Recognition
  google_mlkit_text_recognition: ^0.14.0

  # Network & WebSocket
  web_socket_channel: ^2.4.0
  http: ^1.1.0
  socket_io_client: ^3.0.2
  video_player: ^2.9.2

  # Storage & Data
  sqflite: ^2.3.0
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  wav: ^1.0.0

  # Data Serialization
  json_annotation: ^4.8.1
  equatable: ^2.0.5

  # Utilities
  intl: ^0.20.2
  path: ^1.9.0
  path_provider: ^2.1.1
  uuid: ^4.1.0
  flutter_dotenv: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code Generation
  build_runner: ^2.4.7
  json_serializable: ^6.7.1

  # Linting
  flutter_lints: ^6.0.0

  # App Icon
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/icons/app_icon.png"
  windows:
    generate: true
    image_path: "assets/icons/app_icon.png"
  macos:
    generate: true
    image_path: "assets/icons/app_icon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/flags/
    - assets/icons/
    - assets/lottie/
    - .env
