name: speech_translator_app
description: Real-time multilingual speech translator for holy shrine visitors
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  # State Management & Routing
  get: ^4.6.6

  # UI & Design
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  cupertino_icons: ^1.0.8

  # Audio
  record: ^6.0.0
  flutter_tts: ^4.0.2
  permission_handler: ^11.0.1

  # Media & Location
  image_picker: ^1.0.0
  geolocator: ^10.1.0

  # Network & WebSocket
  web_socket_channel: ^2.4.0
  http: ^1.1.0

  # Storage & Data
  sqflite: ^2.3.0
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  wav: ^1.0.0

  # Data Serialization
  json_annotation: ^4.8.1
  equatable: ^2.0.5

  # Utilities
  intl: ^0.19.0
  path: ^1.9.0
  path_provider: ^2.1.1
  uuid: ^4.1.0
  flutter_dotenv: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code Generation
  build_runner: ^2.4.7
  json_serializable: ^6.7.1

  # Linting
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/flags/
    - assets/icons/
    - .env
